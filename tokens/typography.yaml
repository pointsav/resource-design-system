# PointSav Digital Systems™ - Master Typography Tokens
# Standard: V3 Swiss Grid & Neurodivergent Accessibility

typography:
  font_families:
    sans: '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif'
    mono: 'ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", Menlo, monospace'
  
  fluid_scale_clamp:
    h1: 'clamp(2rem, 5vw, 2.5rem)'
    h3: '1.25rem'
    body: '1rem'
    caption: '0.8rem'
    nav_buttons: '0.75rem'
  
  neuro_metrics:
    baseline_line_height: 1.5 # Establishes the 24px vertical rhythm
    header_line_height: 1.1
    optical_kerning_headers: '-0.02em' # Tightens large text for institutional print feel
    max_character_width: '80ch'
    alignment: 'left' # Strict prohibition on 'justify'
